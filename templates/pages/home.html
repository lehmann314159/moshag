{{define "home-content"}}
<div class="home-logged-in">
    <div class="home-header">
        <h1 class="home-title">Your Adventures</h1>
        <button class="btn btn-primary" onclick="document.getElementById('new-adventure-modal').style.display='flex'">
            + New Adventure
        </button>
    </div>

    {{template "adventure-list" .}}
</div>

<!-- New Adventure Modal -->
<div id="new-adventure-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)this.style.display='none'">
    <div class="modal">
        <div class="modal-header">
            <h2>New Adventure</h2>
            <button class="modal-close" onclick="document.getElementById('new-adventure-modal').style.display='none'">&times;</button>
        </div>
        <form method="POST" action="/adventures/new" class="new-adventure-form">
            <div class="form-group">
                <label for="title">Adventure Title</label>
                <input type="text" id="title" name="title" placeholder="Untitled Adventure" class="form-input" autofocus>
            </div>
            <div class="form-group">
                <label>Mode</label>
                <div class="mode-options">
                    <label class="mode-option">
                        <input type="radio" name="mode" value="manual" checked>
                        <span class="mode-label">
                            <strong>Manual</strong>
                            <small>You roll dice, AI expands</small>
                        </span>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="mode" value="auto">
                        <span class="mode-label">
                            <strong>Auto</strong>
                            <small>AI handles everything</small>
                        </span>
                    </label>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-ghost" onclick="document.getElementById('new-adventure-modal').style.display='none'">Cancel</button>
                <button type="submit" class="btn btn-primary">Create Adventure</button>
            </div>
        </form>
    </div>
</div>

{{end}}
